<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumo de Vendas</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/modules/pasta_vendas/vendas.css') }}">
</head>
<body>
    <div class="container">
        <a href="/" class="voltar">⬅ Voltar</a>
        <h1>📊 Resumo de Vendas</h1>

        <!-- SELETOR DE DATA -->
        <div class="seletor-data">
            <label for="selecionar_data">DATA:</label>
            <input type="date" id="selecionar_data">
            <button onclick="carregarDados()">Consultar</button>
        </div>

        <div class="cards" id="cards">
            <div class="card">
                <h3>📅 Vendas</h3>
                <div class="valor" id="hoje_vendas">Carregando...</div>
            </div>
            <div class="card">
                <h3>💰 Faturamento Hoje</h3>
                <div class="valor positivo" id="hoje_faturamento">Carregando...</div>
            </div>
        </div>

        <div class="atualizacao" id="atualizacao">
            🔄 Atualizado em: Carregando...
        </div>

        <div id="erro" class="erro" style="display:none;"></div>
    </div>

<script src="{{ url_for('static', filename='js/modules/pasta_vendas/vendas.js') }}"></script>
</body>
</html>
